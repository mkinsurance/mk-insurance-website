<!doctype html>
<html lang="en-IN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You | MK Insurance and Financial Solutions</title>
  <meta name="description" content="Thank you for contacting MK Insurance and Financial Solutions. Our insurance expert will call you soon.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="thank-you-page">
  <main class="thank-you-main">
    <section class="thank-you-card">
      <span class="success-icon"><i class="fa-solid fa-circle-check"></i></span>
      <p class="eyebrow">Request Received</p>
      <h1>Thank you for contacting MK Insurance and Financial Solutions</h1>
      <p id="thankYouMessage">Our insurance expert will review your enquiry and contact you shortly.</p>
      <div class="hero-actions justify-content-center">
        <a class="btn btn-primary btn-lg" href="tel:+918076436396"><i class="fa-solid fa-phone"></i> Call 8076436396</a>
        <a class="btn btn-whatsapp btn-lg" href="https://wa.me/918076436396?text=Hi%20MK%20Insurance%2C%20I%20have%20submitted%20the%20consultation%20form." target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i> WhatsApp Expert</a>
      </div>
      <a class="back-link" href="index.html">Back to home</a>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const type = params.get("type");
    const city = params.get("city");
    const message = document.getElementById("thankYouMessage");
    if (name && type) message.textContent = `Thanks ${name}. We received your ${type} enquiry${city ? ` for ${city}` : ""}. Our advisor will contact you shortly.`;
  </script>
</body>
</html>
